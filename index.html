<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* ENVELOPE */
.envelope {
    position: relative;
    width: 280px;
    height: 180px;
    background: #ff6b81;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.6s;
}

.flap {
    position: absolute;
    width: 0;
    height: 0;
    border-left: 140px solid transparent;
    border-right: 140px solid transparent;
    border-bottom: 90px solid #ff4757;
    top: -90px;
    left: 0;
    transform-origin: bottom;
    transition: 0.6s;
}

/* LETTER */
.letter {
    position: absolute;
    width: 260px;
    height: 160px;
    background: white;
    top: 10px;
    left: 10px;
    border-radius: 8px;
    padding: 15px;
    box-sizing: border-box;
    transform: translateY(40px);
    opacity: 0;
    transition: 0.6s;
    overflow-y: auto;
}

/* OPEN STATE */
.open .flap {
    transform: rotateX(180deg);
}

.open .letter {
    transform: translateY(-120px);
    opacity: 1;
}

/* TEXT */
#text {
    font-size: 14px;
    color: #333;
}

/* HEARTS */
.heart {
    position: absolute;
    width: 12px;
    height: 12px;
    background: red;
    transform: rotate(45deg);
    animation: float 6s infinite;
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 12px;
    height: 12px;
    background: red;
    border-radius: 50%;
}

.heart::before { top: -6px; left: 0; }
.heart::after { left: -6px; top: 0; }

@keyframes float {
    0% { transform: translateY(100vh) rotate(45deg); opacity: 1; }
    100% { transform: translateY(-10vh) rotate(45deg); opacity: 0; }
}

.tap-text {
    position: absolute;
    bottom: 40px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 14px;
    animation: blink 1.5s infinite;
}

@keyframes blink {
    50% { opacity: 0.4; }
}
</style>
</head>

<body>

<div class="container">
    <div class="envelope" onclick="openLetter()">
        <div class="flap"></div>
        <div class="letter">
            <div id="text"></div>
        </div>
    </div>
</div>

<div class="tap-text">Tap to open your letter 💌</div>

<script>
const message = `
Happy Birthday Nanu Maa, when you asked me how my life will be without you?
I can never think of a day like that. You are my everything and I will 
always choose you over everything. With everything going on i just
want to say
"Jimaan saleu tumak hepah nopolai,
Kuneu dibo nuare dibo morom mur homaan.
Tumar baade deha,
Nai aan karu premor odhikar💕
I LOVE YOU THE MOSSTTT GOGO MAHARAJ"
`;

let i = 0;
const speed = 30;

function typeWriter() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    }
}

function openLetter() {
    document.querySelector(".envelope").classList.add("open");
    document.querySelector(".tap-text").style.display = "none";
    setTimeout(typeWriter, 600);
}

/* HEARTS */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
